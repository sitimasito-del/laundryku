<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Laundryku</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #172026;
            background: #f6f7f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        main {
            width: min(100%, 720px);
            padding: 32px;
            border: 1px solid #d9dee5;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 48px rgba(23, 32, 38, 0.08);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            color: #0f766e;
            font-size: 14px;
            font-weight: 700;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #14b8a6;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(32px, 6vw, 56px);
            line-height: 1;
        }

        p {
            margin: 0;
            color: #4b5563;
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main>
        <div class="status"><span class="dot"></span>Vercel aktif</div>
        <h1>Laundryku berhasil tampil</h1>
        <p>Halaman utama sementara dilayani sebagai static page agar deployment tidak lagi terkena error 500 dari runtime PHP.</p>
    </main>
</body>
</html>
